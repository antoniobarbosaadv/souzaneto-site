<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1920px;overflow:hidden;font-family:'Inter',sans-serif}
  .card{width:1080px;height:1920px;position:relative;
    background:radial-gradient(900px 600px at 70% 8%,rgba(227,169,58,.20),transparent 60%),linear-gradient(165deg,#123a4f,#0e1c2e 70%);
    color:#fff;display:flex;flex-direction:column;padding:90px 80px}
  .wm{font-family:'Cormorant Garamond',serif;letter-spacing:.42em;font-size:34px;text-transform:uppercase;color:#e3a93a;text-align:center}
  .wmsub{text-align:center;letter-spacing:.5em;font-size:17px;color:#cdd6e1;margin-top:8px;text-transform:uppercase}
  .mid{margin:auto 0;display:flex;flex-direction:column;gap:30px}
  .tag{font-size:24px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#e3a93a}
  .hook{font-size:96px;font-weight:900;line-height:1.05;letter-spacing:-.02em}
  .hook .am{color:#e3a93a}
  .emoji{font-size:90px}
  .foot{font-size:22px;color:#9fb0c0;letter-spacing:.02em}
</style></head>
<body><div class="card">
  <div class="wm">Souza&nbsp;Neto</div>
  <div class="wmsub">Direitos</div>
  <div class="mid">
    <div class="emoji">📱⚖️</div>
    <div class="tag">Golpe do Pix</div>
    <div class="hook">Caí num golpe do Pix.<br><span class="am">O banco TEM que devolver?</span></div>
  </div>
  <div class="foot">@souzaneto.direitos · conteúdo informativo</div>
</div></body></html>
