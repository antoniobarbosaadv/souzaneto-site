<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1920px;overflow:hidden;font-family:'Inter',sans-serif}
  .card{width:1080px;height:1920px;position:relative;
    background:radial-gradient(900px 600px at 50% 100%,rgba(227,169,58,.22),transparent 60%),linear-gradient(165deg,#0e1c2e,#123a4f);
    color:#fff;display:flex;flex-direction:column;padding:100px 80px;text-align:center;align-items:center}
  .wm{font-family:'Cormorant Garamond',serif;letter-spacing:.42em;font-size:34px;text-transform:uppercase;color:#e3a93a}
  .wmsub{letter-spacing:.5em;font-size:17px;color:#cdd6e1;margin-top:8px;text-transform:uppercase}
  .mid{margin:auto 0;display:flex;flex-direction:column;gap:36px;align-items:center}
  .q{font-size:78px;font-weight:900;line-height:1.08;letter-spacing:-.02em}
  .q .am{color:#e3a93a}
  .btn{background:#e3a93a;color:#13110a;font-weight:900;font-size:46px;padding:34px 56px;border-radius:20px}
  .handle{font-size:40px;font-weight:800;color:#fff;letter-spacing:.01em}
  .rule{width:90px;height:5px;background:#e3a93a;border-radius:3px}
  .disc{font-size:21px;color:#9fb0c0;max-width:24ch;line-height:1.4}
</style></head>
<body><div class="card">
  <div><div class="wm">Souza&nbsp;Neto</div><div class="wmsub">Direitos</div></div>
  <div class="mid">
    <div class="rule"></div>
    <div class="q">Ficou com dúvida sobre o <span class="am">SEU caso?</span></div>
    <div class="btn">📲 Link na bio</div>
    <div class="handle">@souzaneto.direitos</div>
  </div>
  <div class="disc">Salva e manda pra quem precisa. Conteúdo informativo — cada caso depende de análise.</div>
</div></body></html>
